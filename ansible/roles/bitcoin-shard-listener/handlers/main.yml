---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_os_family != 'FreeBSD'

- name: Restart bitcoin-shard-listener
  ansible.builtin.service:
    name: "{{ 'bitcoin-shard-listener' if ansible_os_family != 'FreeBSD' else 'bitcoin_shard_listener' }}"
    state: restarted
