---
all:
  children:
    listener_nodes:
      vars:
        # Variables here apply to all listener nodes.
        # Override per-host below as needed.
        ansible_user: ubuntu
        ingress_mode: ethernet
        shard_bits: 2
        mc_scope: site
        enable_firewall: true
        enable_bgp: false

        # Firewall allow-list for SSH / metrics scrape.
        # MUST be set to your management network(s).
        mgmt_cidrs_v4:
          - "10.0.0.0/8"
        mgmt_cidrs_v6: []

        # NOTE: ingress_iface must be set per-host (not here) to override the
        # group_vars/all.yml default. Ansible gives group_vars/all higher
        # precedence than inventory group vars.

      hosts:
        listener-01:
          ansible_host: 203.0.113.50
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          ingress_iface: eth0
          egress_addr: "10.0.1.100:9100"
          retry_endpoints: "10.0.2.10:9300,10.0.2.11:9300"
          bgp_router_id: 203.0.113.50
          bgp_peer_ip: 203.0.113.254

        listener-02:
          ansible_host: 198.51.100.60
          ansible_user: freebsd
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          # FreeBSD interface naming
          ingress_iface: vtnet0
          egress_addr: "10.0.1.101:9100"
          retry_endpoints: "10.0.2.10:9300,10.0.2.11:9300"
          bgp_router_id: 198.51.100.60
          bgp_peer_ip: 198.51.100.254

    # Example group for GRE6-ingress nodes
